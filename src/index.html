<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Claude Pet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --dur-idle-bob:    1500ms;
      --dur-work-bounce: 420ms;
      --dur-wave-anim:   220ms;
      --dur-tremble:     400ms;
      --bubble-font-size: 9px;
      --bubble-max-width: 130px;
      --bubble-padding:   5px 8px;
    }

    html, body {
      width: 160px;
      height: 185px;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: no-drag;
    }

    #pet-container {
      width: 160px;
      height: 185px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 16px;
    }

    /* ── Speech bubble ──────────────────────── */
    #speech-bubble {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: #FAF7F0;
      border: 2px solid #2D1B4E;
      color: #2D1B4E;
      font-family: 'Courier New', monospace;
      font-size: var(--bubble-font-size);
      letter-spacing: 0.5px;
      padding: var(--bubble-padding);
      max-width: var(--bubble-max-width);
      text-align: center;
      line-height: 1.4;
      opacity: 0;
      pointer-events: none;
      z-index: 20;
      transition: opacity 0.25s ease;
      white-space: normal;
    }
    #speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -7px;
      left: 50%;
      width: 6px; height: 6px;
      background: #FAF7F0;
      border-right: 2px solid #2D1B4E;
      border-bottom: 2px solid #2D1B4E;
      transform: translateX(-50%) rotate(45deg);
    }
    #speech-bubble.visible { opacity: 1; }

    /* ── Pixel canvas ───────────────────────── */
    #pet {
      width: 80px;
      height: 80px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: grab;
      position: relative;
      z-index: 2;
      transform-origin: center bottom;
      animation: idle-bob var(--dur-idle-bob) ease-in-out infinite;
    }

    /* ══ IDLE ══ */
    @keyframes idle-bob {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-4px); }
    }

    /* ══ WORKING ══ */
    #pet-container.working #pet {
      animation: work-bounce var(--dur-work-bounce) ease-in-out infinite;
    }
    @keyframes work-bounce {
      0%, 100% { transform: translateY(0px)  scaleY(1); }
      40%       { transform: translateY(-8px) scaleY(1.04); }
      80%       { transform: translateY(1px)  scaleY(0.96); }
    }

    /* ══ WAVING — anime frantic ══ */
    #pet-container.waving #pet {
      animation: anime-wave var(--dur-wave-anim) ease-in-out infinite;
    }
    @keyframes anime-wave {
      0%   { transform: translateY(-4px) rotate(-20deg) scaleX(0.92); }
      50%  { transform: translateY(-4px) rotate( 20deg) scaleX(0.92); }
      100% { transform: translateY(-4px) rotate(-20deg) scaleX(0.92); }
    }

    /* Speed lines behind cat */
    #speed-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      border-radius: 50%;
      background-image: repeating-conic-gradient(
        rgba(218, 119, 86, 0.20) 0deg 1.5deg,
        transparent 1.5deg 10deg
      );
      animation: spin-lines 0.45s linear infinite;
      z-index: 1;
    }
    #pet-container.waving #speed-lines { opacity: 1; }
    @keyframes spin-lines { to { transform: rotate(360deg); } }

    /* Pixel arm (waving only) */
    #arm {
      position: absolute;
      width: 8px;
      height: 28px;
      background: linear-gradient(to bottom,
        #C4614A 0px, #C4614A 4px,
        #DA7756 4px, #DA7756 24px,
        #C4614A 24px, #C4614A 28px
      );
      image-rendering: pixelated;
      right: 22px;
      bottom: 28px;
      transform-origin: 50% 100%;
      display: none;
      z-index: 3;
    }
    #pet-container.waving #arm {
      display: block;
      animation: arm-wave calc(var(--dur-wave-anim) * 0.818) steps(3, end) infinite;
    }
    @keyframes arm-wave {
      0%   { transform: rotate(-50deg); }
      33%  { transform: rotate(-85deg); }
      66%  { transform: rotate(-35deg); }
      100% { transform: rotate(-50deg); }
    }

    /* ══ FRUSTRATED — gentle tremble only ══ */
    #pet-container.frustrated #pet {
      animation: anger-tremble var(--dur-tremble) ease-in-out infinite;
    }
    @keyframes anger-tremble {
      0%   { transform: translateX(-2px); }
      50%  { transform: translateX( 2px); }
      100% { transform: translateX(-2px); }
    }

    /* ══ DANCING ══ */
    #pet-container.dancing #pet {
      animation: dance-spin 2.6s ease-in-out forwards !important;
    }
    @keyframes dance-spin {
      0%   { transform: rotate(  0deg) scale(1);    }
      12%  { transform: rotate(-22deg) scale(1.07); }
      26%  { transform: rotate( 24deg) scale(1.07); }
      38%  { transform: rotate(-16deg) scale(1.03); }
      50%  { transform: rotate(  0deg) scale(1);    }
      54%  { transform: rotate(  0deg) scale(1);    }
      100% { transform: rotate(360deg) scale(1);    }
    }

    /* ══ MUSIC (continuous groove while music plays) ══ */
    :root { --dur-music-groove: 600ms; }

    @keyframes music-groove {
      0%   { transform: translateX(0px)  translateY(0px)  rotate(0deg)   scale(1);    }
      20%  { transform: translateX(-3px) translateY(-4px) rotate(-4deg)  scale(1.06); }
      25%  { transform: translateX(-3px) translateY(-4px) rotate(-4deg)  scale(1.06); }
      50%  { transform: translateX(0px)  translateY(-1px) rotate(0deg)   scale(0.97); }
      70%  { transform: translateX(3px)  translateY(-4px) rotate(4deg)   scale(1.06); }
      75%  { transform: translateX(3px)  translateY(-4px) rotate(4deg)   scale(1.06); }
      100% { transform: translateX(0px)  translateY(0px)  rotate(0deg)   scale(1);    }
    }

    #pet-container.music #pet {
      animation: music-groove var(--dur-music-groove) ease-in-out infinite;
    }

    /* ══ BOING JUMP ══ */
    @keyframes kf-music-jump {
      0%   { transform: translateY(0)    scaleX(1)    scaleY(1);    }
      12%  { transform: translateY(0)    scaleX(1.18) scaleY(0.72); }
      25%  { transform: translateY(-22px) scaleX(0.88) scaleY(1.22); }
      45%  { transform: translateY(-28px) scaleX(0.96) scaleY(1.06); }
      68%  { transform: translateY(-6px)  scaleX(1.10) scaleY(0.94); }
      80%  { transform: translateY(0)    scaleX(1.22) scaleY(0.68); }
      90%  { transform: translateY(-5px)  scaleX(0.97) scaleY(1.05); }
      100% { transform: translateY(0)    scaleX(1)    scaleY(1);    }
    }
    #pet-container.music-jump #pet {
      animation: kf-music-jump 0.85s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards !important;
    }

    /* ══ SHIMMY ══ */
    @keyframes kf-music-shimmy {
      0%   { transform: translateX(0)    scaleX(1)    scaleY(1);    }
      10%  { transform: translateX(-7px) scaleX(0.91) scaleY(1.04); }
      20%  { transform: translateX(6px)  scaleX(1.09) scaleY(0.97); }
      30%  { transform: translateX(-8px) scaleX(0.89) scaleY(1.05); }
      40%  { transform: translateX(7px)  scaleX(1.11) scaleY(0.96); }
      50%  { transform: translateX(-9px) scaleX(0.87) scaleY(1.06); }
      60%  { transform: translateX(8px)  scaleX(1.12) scaleY(0.95); }
      70%  { transform: translateX(-6px) scaleX(0.92) scaleY(1.03); }
      80%  { transform: translateX(5px)  scaleX(1.07) scaleY(0.98); }
      90%  { transform: translateX(-2px) scaleX(0.98) scaleY(1.01); }
      100% { transform: translateX(0)    scaleX(1)    scaleY(1);    }
    }
    #pet-container.music-shimmy #pet {
      animation: kf-music-shimmy 0.72s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards !important;
    }

    /* ══ POP & FLASH ══ */
    @keyframes kf-music-pop-cat {
      0%   { transform: scale(1);                      }
      10%  { transform: scaleX(1.08) scaleY(0.82);     }
      30%  { transform: scaleX(0.92) scaleY(1.32);     }
      50%  { transform: scaleX(0.94) scaleY(1.28);     }
      68%  { transform: scaleX(1.05) scaleY(0.95);     }
      84%  { transform: scaleX(0.99) scaleY(1.02);     }
      100% { transform: scale(1);                      }
    }
    @keyframes kf-music-pop-glow {
      0%   { opacity: 0;    transform: scale(0.6);  }
      25%  { opacity: 0.92; transform: scale(1);    }
      48%  { opacity: 0.85; transform: scale(1.05); }
      75%  { opacity: 0.30; transform: scale(1.1);  }
      100% { opacity: 0;    transform: scale(1.15); }
    }
    #pet-container.music-pop #pet {
      animation: kf-music-pop-cat 0.95s cubic-bezier(0.34, 1.56, 0.64, 1) forwards !important;
    }
    #speed-lines::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 60px 50px at 50% 85%,
        #DA7756 0%,
        #C4614A 30%,
        transparent 70%
      );
      opacity: 0;
      pointer-events: none;
    }
    #pet-container.music-pop #speed-lines::before {
      animation: kf-music-pop-glow 0.95s ease-out forwards;
    }

    /* Floating music notes */
    #music-notes {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 80px;
      pointer-events: none;
      overflow: visible;
      opacity: 0;
      transition: opacity 200ms ease;
    }
    #pet-container.music #music-notes { opacity: 1; }

    @keyframes note-float-left {
      0%   { opacity: 0;   transform: translateY(0px)    translateX(0px)   scale(1);    }
      8%   { opacity: 1;   transform: translateY(-5px)   translateX(-3px)  scale(1.3);  }
      35%  { opacity: 1;   transform: translateY(-28px)  translateX(-10px) scale(1.1);  }
      65%  { opacity: 0.8; transform: translateY(-50px)  translateX(-4px)  scale(0.9);  }
      100% { opacity: 0;   transform: translateY(-78px)  translateX(-14px) scale(0.6);  }
    }
    @keyframes note-float-right {
      0%   { opacity: 0;   transform: translateY(0px)    translateX(0px)   scale(1);    }
      8%   { opacity: 1;   transform: translateY(-6px)   translateX(4px)   scale(1.3);  }
      30%  { opacity: 1;   transform: translateY(-20px)  translateX(12px)  scale(1.15); }
      60%  { opacity: 0.7; transform: translateY(-45px)  translateX(7px)   scale(0.85); }
      100% { opacity: 0;   transform: translateY(-72px)  translateX(16px)  scale(0.55); }
    }

    #music-notes::before {
      content: "♪";
      position: absolute;
      left: 10px; bottom: 14px;
      font-size: 14px; line-height: 1;
      color: #7C3AED; font-family: monospace;
      text-shadow: 1px 1px 0 #2D1B4E, -1px -1px 0 #2D1B4E;
      animation: note-float-left calc(var(--dur-music-groove) * 2.5) ease-in-out infinite;
    }
    #music-notes::after {
      content: "♫";
      position: absolute;
      right: 6px; bottom: 22px;
      font-size: 12px; line-height: 1;
      color: #DA7756; font-family: monospace;
      text-shadow: 1px 1px 0 #C4614A, -1px -1px 0 #C4614A;
      animation: note-float-right calc(var(--dur-music-groove) * 2.5) ease-in-out infinite;
      animation-delay: calc(var(--dur-music-groove) * 1.25);
    }

    /* ── Organic radial glow — replaces the ugly square ── */
    /*
       #speed-lines is positioned to cover the full pet-container (inset: 0).
       In music state we override it to be a radial glow centered on the pet.
       The pet sits at the bottom of the container with padding-bottom: 16px,
       so its vertical center is at ~  bottom: 16px + 40px = 56px from bottom
       = 185 - 56 = 129px from top. Horizontally it is centered at 80px.
       We use a radial-gradient mask approach: a transparent circle in the
       middle that lights up, expanding outward on each beat.
    */
    @keyframes music-radial-pulse {
      0%, 100% {
        opacity: 0.45;
        background: radial-gradient(
          ellipse 38px 32px at 50% 69%,
          rgba(124, 58, 237, 0.55) 0%,
          rgba(124, 58, 237, 0.25) 40%,
          rgba(45,  27,  78, 0.12) 65%,
          transparent 100%
        );
      }
      50% {
        opacity: 0.9;
        background: radial-gradient(
          ellipse 54px 46px at 50% 69%,
          rgba(218, 119, 86, 0.7)  0%,
          rgba(124, 58, 237, 0.45) 38%,
          rgba(45,  27,  78, 0.2)  62%,
          transparent 100%
        );
      }
    }
    #pet-container.music #speed-lines {
      animation: none;
      background: transparent;
      position: absolute;
      inset: 0;
      border-radius: 0;
      box-shadow: none;
      pointer-events: none;
      animation: music-radial-pulse var(--dur-music-groove) ease-in-out infinite;
    }
    #pet-container:not(.music):not(.waving) #speed-lines {
      opacity: 0;
      box-shadow: none;
      animation: none;
    }

    /* ── Ear glow sparks ── */
    /*
       The canvas is 80×80, scaled to 80px CSS.
       Left ear: pixel x ≈ 3–5 of the 16px grid  → CSS x ≈ 15–25px  (canvas left edge ~40px from container center)
       Right ear: pixel x ≈ 11–12 of the 16px grid → CSS x ≈ 55–60px
       The pet sits bottom-aligned with padding-bottom:16px, so canvas bottom = 16px from container bottom.
       Canvas top = 16 + 80 = 96px from bottom = 185 - 96 = 89px from top.
       Ear tops are at pixel row 0 → CSS top ≈ 89px from container top.
       Container is 160px wide; canvas starts at (160-80)/2 = 40px from left.
       Left ear CSS x in container:  40 + (3/16)*80 ≈ 40 + 15 = 55px
       Right ear CSS x in container: 40 + (11/16)*80 ≈ 40 + 55 = 95px
    */
    #ear-glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      z-index: 3;
    }
    #pet-container.music #ear-glow {
      opacity: 1;
    }

    @keyframes ear-spark-left {
      0%   { opacity: 0; transform: translate(0px, 0px)   scale(0);   }
      15%  { opacity: 1; transform: translate(-4px, -6px) scale(1.4); }
      45%  { opacity: 1; transform: translate(-7px, -14px) scale(1);  }
      80%  { opacity: 0; transform: translate(-9px, -22px) scale(0.5); }
      100% { opacity: 0; transform: translate(-9px, -22px) scale(0);  }
    }
    @keyframes ear-spark-right {
      0%   { opacity: 0; transform: translate(0px, 0px)   scale(0);   }
      15%  { opacity: 1; transform: translate(4px, -6px)  scale(1.4); }
      45%  { opacity: 1; transform: translate(7px, -14px)  scale(1);  }
      80%  { opacity: 0; transform: translate(9px, -22px)  scale(0.5); }
      100% { opacity: 0; transform: translate(9px, -22px)  scale(0);  }
    }

    #ear-glow::before {
      content: '';
      position: absolute;
      /* left ear tip position */
      left: 53px;
      top: 87px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #7C3AED;
      box-shadow:
        0 0 0 2px #2D1B4E,
        0 0 6px 3px rgba(124, 58, 237, 0.8),
        0 0 2px 1px #FAF7F0;
      animation: ear-spark-left calc(var(--dur-music-groove) * 3.1) ease-in-out infinite;
      animation-delay: calc(var(--dur-music-groove) * 0.4);
    }
    #ear-glow::after {
      content: '';
      position: absolute;
      /* right ear tip position */
      left: 97px;
      top: 87px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #DA7756;
      box-shadow:
        0 0 0 2px #2D1B4E,
        0 0 6px 3px rgba(218, 119, 86, 0.8),
        0 0 2px 1px #FAF7F0;
      animation: ear-spark-right calc(var(--dur-music-groove) * 3.1) ease-in-out infinite;
      animation-delay: calc(var(--dur-music-groove) * 1.85);
    }

    /* ══ PETTING ══ */
    #pet-container.petting #pet {
      animation: wiggle 0.55s ease-in-out forwards !important;
    }
    @keyframes wiggle {
      0%   { transform: rotate(0deg)   scale(1);    }
      20%  { transform: rotate(-13deg) scale(1.1);  }
      40%  { transform: rotate( 13deg) scale(1.1);  }
      60%  { transform: rotate(-9deg)  scale(1.05); }
      80%  { transform: rotate( 7deg)  scale(1.02); }
      100% { transform: rotate(0deg)   scale(1);    }
    }

    /* ══ FEEDING ══ */
    #pet-container.feeding #pet {
      animation: chomp 0.18s steps(2, end) 4 forwards !important;
    }
    @keyframes chomp {
      0%   { transform: scaleY(1)    translateY(0px);  }
      50%  { transform: scaleY(1.12) translateY(-3px); }
      100% { transform: scaleY(1)    translateY(0px);  }
    }

    /* ══ HOVER ══ */
    #pet-container.hover #pet {
      filter: drop-shadow(0 0 5px rgba(218, 119, 86, 0.8));
    }

    /* ══ DRAGGING ══ */
    #pet-container.dragging #pet {
      animation: none !important;
      cursor: grabbing;
      transform: scale(0.93);
    }

    /* ── Particles ──────────────────────────── */
    .particle {
      position: absolute;
      pointer-events: none;
      z-index: 10;
      animation: float-up 1.1s ease-out forwards;
    }
    @keyframes float-up {
      0%   { opacity: 1; transform: translateY(0)    scale(1)   rotate(0deg);  }
      60%  { opacity: 1; transform: translateY(-50px) scale(1.2) rotate(15deg); }
      100% { opacity: 0; transform: translateY(-85px) scale(0.5) rotate(35deg); }
    }
  </style>
</head>
<body>
  <div id="pet-container" class="idle">
    <div id="speech-bubble"></div>
    <div id="speed-lines"></div>
    <div id="music-notes"></div>
    <div id="ear-glow"></div>
    <div id="arm"></div>
    <canvas id="pet" width="16" height="16"></canvas>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
