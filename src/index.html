<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Claude Pet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 160px;
      height: 185px;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: no-drag;
    }

    #pet-container {
      width: 160px;
      height: 185px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 16px;
    }

    /* ── Speech bubble ──────────────────────── */
    #speech-bubble {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: #FAF7F0;
      border: 2px solid #2D1B4E;
      color: #2D1B4E;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 0.5px;
      padding: 5px 8px;
      max-width: 130px;
      text-align: center;
      line-height: 1.4;
      opacity: 0;
      pointer-events: none;
      z-index: 20;
      transition: opacity 0.25s ease;
      white-space: normal;
    }
    #speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -7px;
      left: 50%;
      width: 6px; height: 6px;
      background: #FAF7F0;
      border-right: 2px solid #2D1B4E;
      border-bottom: 2px solid #2D1B4E;
      transform: translateX(-50%) rotate(45deg);
    }
    #speech-bubble.visible { opacity: 1; }

    /* ── Pixel canvas ───────────────────────── */
    #pet {
      width: 80px;
      height: 80px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: grab;
      position: relative;
      z-index: 2;
      transform-origin: center bottom;
      animation: idle-bob 1.5s ease-in-out infinite;
    }

    /* ══ IDLE ══ */
    @keyframes idle-bob {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-4px); }
    }

    /* ══ WORKING ══ */
    #pet-container.working #pet {
      animation: work-bounce 0.42s ease-in-out infinite;
    }
    @keyframes work-bounce {
      0%, 100% { transform: translateY(0px)  scaleY(1); }
      40%       { transform: translateY(-8px) scaleY(1.04); }
      80%       { transform: translateY(1px)  scaleY(0.96); }
    }

    /* ══ WAVING — anime frantic ══ */
    #pet-container.waving #pet {
      animation: anime-wave 0.22s ease-in-out infinite;
    }
    @keyframes anime-wave {
      0%   { transform: translateY(-4px) rotate(-20deg) scaleX(0.92); }
      50%  { transform: translateY(-4px) rotate( 20deg) scaleX(0.92); }
      100% { transform: translateY(-4px) rotate(-20deg) scaleX(0.92); }
    }

    /* Speed lines behind cat */
    #speed-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      border-radius: 50%;
      background-image: repeating-conic-gradient(
        rgba(218, 119, 86, 0.20) 0deg 1.5deg,
        transparent 1.5deg 10deg
      );
      animation: spin-lines 0.45s linear infinite;
      z-index: 1;
    }
    #pet-container.waving #speed-lines { opacity: 1; }
    @keyframes spin-lines { to { transform: rotate(360deg); } }

    /* Pixel arm (waving only) */
    #arm {
      position: absolute;
      width: 8px;
      height: 28px;
      background: linear-gradient(to bottom,
        #C4614A 0px, #C4614A 4px,
        #DA7756 4px, #DA7756 24px,
        #C4614A 24px, #C4614A 28px
      );
      image-rendering: pixelated;
      right: 22px;
      bottom: 28px;
      transform-origin: 50% 100%;
      display: none;
      z-index: 3;
    }
    #pet-container.waving #arm {
      display: block;
      animation: arm-wave 0.18s steps(3, end) infinite;
    }
    @keyframes arm-wave {
      0%   { transform: rotate(-50deg); }
      33%  { transform: rotate(-85deg); }
      66%  { transform: rotate(-35deg); }
      100% { transform: rotate(-50deg); }
    }

    /* ══ FRUSTRATED — gentle tremble only ══ */
    #pet-container.frustrated #pet {
      animation: anger-tremble 0.4s ease-in-out infinite;
    }
    @keyframes anger-tremble {
      0%   { transform: translateX(-2px); }
      50%  { transform: translateX( 2px); }
      100% { transform: translateX(-2px); }
    }

    /* ══ PETTING ══ */
    #pet-container.petting #pet {
      animation: wiggle 0.55s ease-in-out forwards !important;
    }
    @keyframes wiggle {
      0%   { transform: rotate(0deg)   scale(1);    }
      20%  { transform: rotate(-13deg) scale(1.1);  }
      40%  { transform: rotate( 13deg) scale(1.1);  }
      60%  { transform: rotate(-9deg)  scale(1.05); }
      80%  { transform: rotate( 7deg)  scale(1.02); }
      100% { transform: rotate(0deg)   scale(1);    }
    }

    /* ══ FEEDING ══ */
    #pet-container.feeding #pet {
      animation: chomp 0.18s steps(2, end) 4 forwards !important;
    }
    @keyframes chomp {
      0%   { transform: scaleY(1)    translateY(0px);  }
      50%  { transform: scaleY(1.12) translateY(-3px); }
      100% { transform: scaleY(1)    translateY(0px);  }
    }

    /* ══ HOVER ══ */
    #pet-container.hover #pet {
      filter: drop-shadow(0 0 5px rgba(218, 119, 86, 0.8));
    }

    /* ══ DRAGGING ══ */
    #pet-container.dragging #pet {
      animation: none !important;
      cursor: grabbing;
      transform: scale(0.93);
    }

    /* ── Particles ──────────────────────────── */
    .particle {
      position: absolute;
      pointer-events: none;
      z-index: 10;
      animation: float-up 1.1s ease-out forwards;
    }
    @keyframes float-up {
      0%   { opacity: 1; transform: translateY(0)    scale(1)   rotate(0deg);  }
      60%  { opacity: 1; transform: translateY(-50px) scale(1.2) rotate(15deg); }
      100% { opacity: 0; transform: translateY(-85px) scale(0.5) rotate(35deg); }
    }
  </style>
</head>
<body>
  <div id="pet-container" class="idle">
    <div id="speech-bubble"></div>
    <div id="speed-lines"></div>
    <div id="arm"></div>
    <canvas id="pet" width="16" height="16"></canvas>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
